<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="scoreboard">
      <div class="score" id="score-x">
        <span class="player-label x-label">X</span>
        <span class="score-value" id="x-score">0</span>
      </div>
      <div class="score draws">
        <span class="player-label">Döntetlen</span>
        <span class="score-value" id="draw-score">0</span>
      </div>
      <div class="score" id="score-o">
        <span class="player-label o-label">O</span>
        <span class="score-value" id="o-score">0</span>
      </div>
    </div>

    <div class="status" id="status">X játékos következik</div>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <div class="controls">
      <button class="btn" id="reset-btn">Új játék</button>
      <button class="btn btn-secondary" id="reset-scores-btn">Eredmény törlése</button>
    </div>

    <div class="mode-selector">
      <label>
        <input type="radio" name="mode" value="pvp" checked /> Két játékos
      </label>
      <label>
        <input type="radio" name="mode" value="ai" /> Gép ellen
      </label>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
